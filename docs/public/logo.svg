<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="45" fill="#646cff"/>
  
  <!-- 树状结构图标 -->
  <g fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- 根节点 -->
    <circle cx="50" cy="20" r="6"/>
    
    <!-- 连接线到第二层 -->
    <line x1="50" y1="26" x2="50" y2="40"/>
    <line x1="50" y1="40" x2="25" y2="60"/>
    <line x1="50" y1="40" x2="75" y2="60"/>
    
    <!-- 第二层节点 -->
    <circle cx="25" cy="60" r="5"/>
    <circle cx="75" cy="60" r="5"/>
    
    <!-- 连接线到第三层 -->
    <line x1="25" y1="65" x2="15" y2="85"/>
    <line x1="25" y1="65" x2="35" y2="85"/>
    <line x1="75" y1="65" x2="65" y2="85"/>
    <line x1="75" y1="65" x2="85" y2="85"/>
    
    <!-- 第三层节点 -->
    <circle cx="15" cy="85" r="4"/>
    <circle cx="35" cy="85" r="4"/>
    <circle cx="65" cy="85" r="4"/>
    <circle cx="85" cy="85" r="4"/>
  </g>
  
  <!-- JSON/HJSON 花括号装饰 -->
  <text x="50" y="55" font-family="monospace" font-size="14" fill="white" text-anchor="middle" font-weight="bold" opacity="0.9">
    { }
  </text>
</svg>
